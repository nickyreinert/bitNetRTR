<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BitNet Local Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="shell" class="shell">
    <aside id="settings-drawer" class="sidebar left" aria-hidden="true">
      <div class="sidebar-head">
        <strong>Options</strong>
        <button id="settings-close" type="button">Close</button>
      </div>
      <div class="sidebar-body">
        <div class="settings-form">
          <label class="field">
            <span>API Key</span>
            <input id="api-key" type="password" placeholder="X-API-KEY" autocomplete="off" />
          </label>

          <label class="toggle">
            <input id="use-proxy" type="checkbox" />
            Use /api proxy
          </label>

          <label class="field">
            <span>Model</span>
            <select id="bitnet-model" aria-label="Model"></select>
          </label>

          <label class="field">
            <span>N Predict</span>
            <input id="bitnet-npredict" type="number" min="1" step="1" />
          </label>

          <label class="field">
            <span>Threads</span>
            <input id="bitnet-threads" type="number" min="1" step="1" />
          </label>

          <label class="field">
            <span>Context Size</span>
            <input id="bitnet-ctx" type="number" min="1" step="1" />
          </label>

          <label class="field">
            <span>Temperature</span>
            <input id="bitnet-temp" type="number" min="0" step="0.01" />
          </label>
        </div>
      </div>
    </aside>

    <section class="main-pane">
      <header class="topbar">
        <div class="title-wrap">
          <h1 class="title">VVPP OPEN</h1>
          <div class="subtitle">VERY VERSATILE PERFORMANCE PLATFORM</div>
          <pre>powered by <a href="https://github.com/microsoft/bitNet" target="_blank">bitNet</a></pre>
          <div id="status" class="status">idle</div>
        </div>
      </header>

      <section id="chat" aria-live="polite"></section>

      <footer class="composer">
        <input id="msg" type="text" placeholder="Prompt your local model..." autocomplete="off" />
        <button id="send-btn" type="button">Send</button>
      </footer>
    </section>

    <aside id="stats-drawer" class="sidebar right" aria-hidden="true">
      <div class="sidebar-head">
        <strong>Runtime Stats</strong>
        <button id="stats-close" type="button">Close</button>
      </div>
      <div id="stats-body" class="sidebar-body"></div>
    </aside>
  </main>

  <button id="options-btn" class="edge-tab" type="button" aria-label="Options" title="Options">
    <span class="sr-only">Options</span>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M10.24 3.41 9.6 5.32a7.15 7.15 0 0 0-1.56.65L6.2 5.12 4.62 6.7l.85 1.84c-.27.49-.49 1.01-.64 1.56l-1.92.64v2.24l1.92.64c.15.55.37 1.07.64 1.56l-.85 1.84 1.58 1.58 1.84-.85c.49.27 1.01.49 1.56.64l.64 1.92h2.24l.64-1.92c.55-.15 1.07-.37 1.56-.64l1.84.85 1.58-1.58-.85-1.84c.27-.49.49-1.01.64-1.56l1.92-.64V10.6l-1.92-.64a7.15 7.15 0 0 0-.64-1.56l.85-1.84-1.58-1.58-1.84.85a7.15 7.15 0 0 0-1.56-.64l-.64-1.91z"></path>
      <circle cx="12" cy="12" r="3.15"></circle>
    </svg>
  </button>

  <button id="stats-btn" class="edge-tab" type="button" aria-label="Stats" title="Stats" hidden>
    <span class="sr-only">Stats</span>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 19.5h16"></path>
      <path d="M7 16V11"></path>
      <path d="M12 16V7"></path>
      <path d="M17 16V4.5"></path>
    </svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
